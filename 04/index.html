<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>웹 기술 전략 2026 | 아키텍처에서 미래까지</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;700;800&display=swap');
        
        :root { scroll-behavior: smooth; }

        body {
            font-family: 'Pretendard', sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }

        .glass-header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .dark .glass-header {
            background: rgba(15, 23, 42, 0.8);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .hero-gradient {
            background: radial-gradient(circle at top right, rgba(59, 130, 246, 0.1), transparent),
                        radial-gradient(circle at bottom left, rgba(139, 92, 246, 0.1), transparent);
        }

        .gradient-text {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal-overlay {
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        /* 테마 드롭다운 */
        #theme-dropdown {
            display: none;
            transform-origin: top right;
        }
        #theme-dropdown.active {
            display: block;
            animation: dropdownFade 0.2s ease forwards;
        }
        @keyframes dropdownFade {
            from { opacity: 0; transform: translateY(-10px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card-hover:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="bg-white text-slate-900 dark:bg-slate-950 dark:text-slate-100">

    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-[60] glass-header transition-all duration-300">
        <div class="container mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                    <i class="fa-solid fa-layer-group"></i>
                </div>
                <span class="text-xl font-black tracking-tighter uppercase">WebStrategy<span class="text-blue-600">2026</span></span>
            </div>
            
            <div class="flex items-center gap-4 relative">
                <!-- 다크모드 선택 버튼 -->
                <div class="relative">
                    <button id="theme-btn" class="w-10 h-10 rounded-full border border-slate-200 dark:border-slate-800 flex items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                        <i id="theme-icon" class="fa-solid fa-circle-half-stroke"></i>
                    </button>
                    <!-- 테마 드롭다운 메뉴 -->
                    <div id="theme-dropdown" class="absolute top-12 right-0 w-32 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl shadow-xl overflow-hidden py-1 z-[70]">
                        <button onclick="setTheme('light')" class="w-full px-4 py-2 text-left text-sm hover:bg-slate-100 dark:hover:bg-slate-800 flex items-center gap-2">
                            <i class="fa-solid fa-sun text-orange-500 w-4"></i> 라이트
                        </button>
                        <button onclick="setTheme('dark')" class="w-full px-4 py-2 text-left text-sm hover:bg-slate-100 dark:hover:bg-slate-800 flex items-center gap-2">
                            <i class="fa-solid fa-moon text-blue-400 w-4"></i> 다크
                        </button>
                    </div>
                </div>

                <!-- 보고서 PDF 버튼: PPT.04.pdf 다운로드 -->
                <a href="PPT.04.pdf" download="PPT.04.pdf" class="hidden sm:flex items-center gap-2 px-5 py-2.5 bg-slate-900 dark:bg-white text-white dark:text-slate-900 rounded-full text-sm font-bold hover:scale-105 transition-transform">
                    <i class="fa-solid fa-download"></i>
                    보고서 PDF
                </a>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="relative pt-40 pb-32 overflow-hidden hero-gradient">
        <div class="container mx-auto px-6 relative z-10 text-center">
            <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight mb-8 leading-[1.1]">
                웹의 <span class="gradient-text">본질</span>을 꿰뚫고<br>미래를 <span class="gradient-text">설계</span>하라
            </h1>
            <p class="text-lg md:text-xl text-slate-600 dark:text-slate-400 max-w-3xl mx-auto mb-12">
                지속 가능한 비즈니스를 위한 기술 아키텍처와 웹 표준의 모든 것을 분석했습니다.
            </p>
            
            <div class="flex flex-col sm:flex-row justify-center items-center gap-4">
                <!-- 전략 인포그래픽 보기 버튼: 모달 활성화 -->
                <button onclick="openModal()" class="w-full sm:w-auto px-10 py-5 bg-blue-600 text-white rounded-2xl font-bold text-lg hover:bg-blue-700 hover:shadow-xl transition-all active:scale-95 flex items-center justify-center gap-3">
                    <i class="fa-solid fa-chart-line"></i>
                    전략 인포그래픽 보기
                </button>
                <!-- 해설 영상 시청 버튼: mp4.04_50%.mp4 실행 -->
                <a href="mp4.04_50%.mp4" target="_blank" class="w-full sm:w-auto px-10 py-5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl font-bold text-lg hover:bg-slate-50 dark:hover:bg-slate-800 transition-all flex items-center justify-center gap-3 shadow-sm">
                    <i class="fa-solid fa-play-circle text-blue-600"></i>
                    해설 영상 시청
                </a>
            </div>
        </div>
    </section>

    <!-- Content Sections -->
    <section class="py-24 container mx-auto px-6 grid grid-cols-1 md:grid-cols-3 gap-8">
        <div class="p-8 rounded-3xl bg-slate-50 dark:bg-slate-900 border-t-4 border-blue-500 card-hover transition-all">
            <h4 class="text-xl font-bold mb-4">프레젠테이션 계층</h4>
            <p class="text-slate-600 dark:text-slate-400 text-sm">HTML5, CSS3, JavaScript를 통한 직관적인 사용자 경험 제공에 집중합니다.</p>
        </div>
        <div class="p-8 rounded-3xl bg-slate-50 dark:bg-slate-900 border-t-4 border-purple-500 card-hover transition-all">
            <h4 class="text-xl font-bold mb-4">애플리케이션 계층</h4>
            <p class="text-slate-600 dark:text-slate-400 text-sm">핵심 비즈니스 로직과 API Gateway를 통해 시스템의 유연성을 확보합니다.</p>
        </div>
        <div class="p-8 rounded-3xl bg-slate-50 dark:bg-slate-900 border-t-4 border-emerald-500 card-hover transition-all">
            <h4 class="text-xl font-bold mb-4">데이터 계층</h4>
            <p class="text-slate-600 dark:text-slate-400 text-sm">데이터 무결성과 영속성을 보장하는 고성능 데이터베이스 아키텍처를 구축합니다.</p>
        </div>
    </section>

    <!-- Infographic Modal -->
    <div id="infographic-modal" class="modal-overlay fixed inset-0 z-[100] bg-black/90 flex items-center justify-center p-6 backdrop-blur-md">
        <div class="relative max-w-6xl w-full max-h-[90vh] bg-white dark:bg-slate-900 rounded-[32px] overflow-hidden flex flex-col shadow-2xl">
            <div class="flex items-center justify-between p-6 border-b border-slate-100 dark:border-slate-800">
                <h4 class="text-xl font-bold">2026 웹 기술 표준 전략 인포그래픽</h4>
                <button onclick="closeModal()" class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800 hover:rotate-90 transition-transform">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>
            <!-- 인포그래픽 이미지: img.04.jpg -->
            <div class="flex-1 overflow-auto p-8 flex items-center justify-center bg-slate-50 dark:bg-slate-950/50">
                <img src="img.04.jpg" alt="전략 인포그래픽" class="max-w-full h-auto rounded-xl shadow-2xl">
            </div>
            <div class="p-6 text-center border-t border-slate-100 dark:border-slate-800">
                <button onclick="closeModal()" class="px-8 py-3 bg-blue-600 text-white rounded-full font-bold">닫기</button>
            </div>
        </div>
    </div>

    <script>
        // --- 테마 설정 로직 ---
        const themeBtn = document.getElementById('theme-btn');
        const themeDropdown = document.getElementById('theme-dropdown');
        const themeIcon = document.getElementById('theme-icon');
        const htmlElement = document.documentElement;

        // 드롭다운 토글
        themeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            themeDropdown.classList.toggle('active');
        });

        // 테마 변경
        function setTheme(theme) {
            if (theme === 'dark') {
                htmlElement.classList.add('dark');
                themeIcon.className = 'fa-solid fa-moon text-blue-400';
            } else {
                htmlElement.classList.remove('dark');
                themeIcon.className = 'fa-solid fa-sun text-orange-500';
            }
            localStorage.setItem('theme', theme);
            themeDropdown.classList.remove('active');
        }

        // 외부 클릭 시 드롭다운 닫기
        window.addEventListener('click', () => {
            themeDropdown.classList.remove('active');
        });

        // 초기 테마 적용
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            setTheme('dark');
        } else {
            setTheme('light');
        }

        // --- 모달 로직 ---
        function openModal() {
            document.getElementById('infographic-modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        function closeModal() {
            document.getElementById('infographic-modal').classList.remove('active');
            document.body.style.overflow = '';
        }

        // --- 헤더 스크롤 효과 ---
        window.addEventListener('scroll', () => {
            const nav = document.querySelector('nav');
            if (window.scrollY > 20) {
                nav.classList.add('shadow-md', 'h-16');
                nav.querySelector('.container').classList.replace('h-20', 'h-16');
            } else {
                nav.classList.remove('shadow-md', 'h-16');
                nav.querySelector('.container').classList.replace('h-16', 'h-20');
            }
        });
    </script>
</body>
</html>
