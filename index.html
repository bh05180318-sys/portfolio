<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Literacy Portfolio | 김보현</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0a0a0c',
                        lightBg: '#f8fafc'
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
            overflow-x: hidden;
        }

        .project-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .project-card:hover {
            transform: translateY(-8px);
        }

        /* 카드별 강조 색상 변수 */
        .card-blue { --accent: 59, 130, 246; --bg-soft: 239, 246, 255; --bg-dark: 30, 58, 138; }
        .card-purple { --accent: 147, 51, 234; --bg-soft: 250, 245, 255; --bg-dark: 88, 28, 135; }
        .card-emerald { --accent: 16, 185, 129; --bg-soft: 236, 253, 245; --bg-dark: 6, 78, 59; }
        .card-rose { --accent: 244, 63, 94; --bg-soft: 255, 241, 242; --bg-dark: 136, 19, 55; }
        .card-amber { --accent: 245, 158, 11; --bg-soft: 255, 251, 235; --bg-dark: 120, 53, 15; }

        .project-card:hover {
            box-shadow: 0 20px 40px -10px rgba(var(--accent), 0.2);
            border-color: rgba(var(--accent), 0.4);
        }

        .view-section {
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.5s ease;
        }
        .view-hidden {
            display: none;
            opacity: 0;
            transform: translateX(50px);
        }
        .view-active {
            display: block;
            opacity: 1;
            transform: translateX(0);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(128, 128, 128, 0.2); border-radius: 10px; }
    </style>
</head>
<body class="bg-lightBg text-slate-800 dark:bg-darkBg dark:text-slate-200 selection:bg-blue-500/30">

    <!-- 상단 내비게이션 -->
    <nav id="navbar" class="fixed top-0 w-full z-50 transition-all duration-300 py-6 px-6 bg-white/80 dark:bg-darkBg/80 backdrop-blur-md border-b border-slate-200 dark:border-white/5">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <button id="back-btn" class="hidden w-10 h-10 flex items-center justify-center rounded-full bg-slate-100 dark:bg-white/5 hover:bg-slate-200 dark:hover:bg-white/10 transition-colors">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <div class="text-xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 dark:from-blue-400 dark:to-purple-500 bg-clip-text text-transparent tracking-tighter">
                    AI LITERACY
                </div>
            </div>
            <button id="theme-toggle" class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-200 dark:bg-white/5 border border-slate-300 dark:border-white/10 text-slate-600 dark:text-yellow-400 hover:scale-110 transition-all">
                <i id="theme-icon" class="fa-solid fa-moon"></i>
            </button>
        </div>
    </nav>

    <!-- 메인 리스트 뷰 -->
    <main id="list-view" class="view-section view-active pt-32 pb-20 px-6">
        <header class="max-w-5xl mx-auto text-center mb-20 relative">
            <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[600px] h-[300px] bg-blue-500/10 blur-[100px] rounded-full pointer-events-none"></div>
            <div class="inline-block px-4 py-1.5 mb-6 rounded-full border border-blue-500/30 bg-blue-500/5 text-blue-600 dark:text-blue-400 text-xs font-bold tracking-widest uppercase">
                Portfolio 2024
            </div>
            <h1 class="text-4xl md:text-6xl font-extrabold mb-6 tracking-tight text-slate-900 dark:text-white">
                AI 리터러시 결과 보고서
            </h1>
            <p class="text-lg text-slate-600 dark:text-slate-400 max-w-2xl mx-auto leading-relaxed">
                생성형 AI의 이해부터 데이터 분석, 최종 솔루션 제안까지 15주간 진행된 AI 융합 학습의 여정을 소개합니다.
            </p>
        </header>

        <section class="max-w-7xl mx-auto">
            <div id="project-container" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- JavaScript renders cards here -->
            </div>
        </section>
    </main>

    <!-- 상세 보기 섹션 -->
    <main id="detail-view" class="view-section view-hidden pt-32 pb-20 px-6">
        <div class="max-w-4xl mx-auto">
            
            <!-- 신규 버튼: 실습 페이지 이동 (./04/index.html) -->
            <div id="action-button-container" class="mb-8 hidden">
                <a id="external-link" href="./04/index.html" class="flex items-center justify-between w-full p-5 bg-gradient-to-r from-blue-600 to-indigo-700 hover:from-blue-700 hover:to-indigo-800 text-white rounded-2xl shadow-lg shadow-blue-500/20 transition-all active:scale-[0.98] group">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-xl bg-white/20 flex items-center justify-center text-2xl group-hover:rotate-6 transition-transform">
                            <i class="fa-solid fa-paper-plane"></i>
                        </div>
                        <div class="text-left">
                            <p class="text-[10px] font-black uppercase tracking-[0.2em] opacity-70">실습 결과물 확인하기</p>
                            <h4 class="text-lg font-bold">프롬프트 엔지니어링 실습 페이지로 이동</h4>
                        </div>
                    </div>
                    <div class="mr-2 opacity-50 group-hover:translate-x-1 transition-transform">
                        <i class="fa-solid fa-chevron-right text-xl"></i>
                    </div>
                </a>
            </div>

            <!-- 헤더 영역 -->
            <div id="detail-header" class="relative rounded-3xl overflow-hidden mb-12 min-h-[300px] flex flex-col justify-end p-8 md:p-12 text-white transition-colors duration-500 shadow-2xl">
                <div id="detail-accent-bg" class="absolute inset-0 z-0 opacity-80"></div>
                <div class="relative z-10">
                    <div id="detail-task-id" class="inline-block px-3 py-1 rounded-lg bg-white/20 backdrop-blur-md text-[10px] font-black uppercase mb-4 tracking-widest">TASK 03</div>
                    <h2 id="detail-title" class="text-4xl md:text-5xl font-black leading-tight mb-6">프로젝트 제목</h2>
                    <div id="detail-tags" class="flex flex-wrap gap-2"></div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-12">
                <div class="md:col-span-2 space-y-12">
                    <section>
                        <h3 class="text-xl font-bold mb-4 flex items-center gap-2">
                            <i class="fa-solid fa-circle-info text-blue-500"></i> 과제 개요
                        </h3>
                        <p id="detail-description" class="text-slate-600 dark:text-slate-400 leading-relaxed text-lg"></p>
                    </section>

                    <section>
                        <h3 class="text-xl font-bold mb-6 flex items-center gap-2">
                            <i class="fa-solid fa-star text-emerald-500"></i> 주요 학습 및 성과
                        </h3>
                        <div id="detail-achievements" class="grid gap-4"></div>
                    </section>
                </div>

                <div class="space-y-8">
                    <div class="p-6 rounded-2xl bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10">
                        <h4 class="text-xs font-black uppercase tracking-widest text-slate-400 mb-6">사용 도구</h4>
                        <div id="detail-tools" class="flex flex-wrap gap-2"></div>
                    </div>

                    <div class="p-6 rounded-2xl bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10">
                        <h4 class="text-xs font-black uppercase tracking-widest text-slate-400 mb-4">과제 유형</h4>
                        <p id="detail-category" class="font-bold text-slate-800 dark:text-slate-200"></p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const projects = [
            { 
                id: 1, 
                title: "AI의 이해: 역사와 생성형 AI 탐구", 
                tags: ["NotebookLM", "AI역사", "LLM기초"], 
                icon: "fa-book-open-reader", 
                color: "card-blue",
                description: "구글 NotebookLM을 활용해 AI의 정의와 역사, 최신 생성형 AI 트렌드를 체계적으로 정리하고 학습했습니다.",
                achievements: [
                    { title: "AI 역사 분석", desc: "기호주의와 연결주의의 발전을 시기별로 정리" },
                    { title: "NotebookLM 활용", desc: "핵심 인사이트 추출 워크플로우 숙달" }
                ],
                tools: ["NotebookLM", "ChatGPT"],
                category: "기초 이론"
            },
            { 
                id: 2, 
                title: "공공 데이터를 활용한 문제 정의", 
                tags: ["데이터분석", "사회문제", "KOSIS"], 
                icon: "fa-magnifying-glass-chart", 
                color: "card-emerald",
                description: "공공 데이터를 수집하고 분석하여 사회복지 관점에서 해결이 필요한 지역 사회 문제를 수치로 정의했습니다.",
                achievements: [
                    { title: "문제 정의 역량", desc: "사회 문제를 데이터 기반의 구체적인 문제로 치환" },
                    { title: "데이터 시각화", desc: "통계 지표를 통해 객관적 입증" }
                ],
                tools: ["KOSIS", "Excel"],
                category: "데이터 분석"
            },
            { 
                id: 3, 
                title: "프롬포트 엔지니어링: 질문의 기술", 
                tags: ["HTML", "CSS", "Prompt"], 
                icon: "fa-terminal", 
                color: "card-purple",
                hasExternalLink: true, // 링크 여부 플래그
                description: "효율적인 결과 도출을 위한 프롬프트 구조와 웹 기술 기초를 접목한 실습을 진행하였습니다. 특히 AI와 협력하여 웹 페이지를 구축하는 과정을 경험했습니다.",
                achievements: [
                    { title: "효과적인 프롬프트 설계", desc: "Few-shot, CoT 기법을 활용한 정교한 명령어 생성" },
                    { title: "웹 기초 역량 확보", desc: "HTML/CSS 실습을 통한 웹 서비스 구조에 대한 이해" }
                ],
                tools: ["VS Code", "Claude 3", "ChatGPT"],
                category: "웹 기술 및 프롬프트"
            },
            { 
                id: 4, 
                title: "생성형 AI 이미지 스토리텔링", 
                tags: ["Midjourney", "DALL-E", "창의력"], 
                icon: "fa-palette", 
                color: "card-rose",
                description: "AI를 활용하여 텍스트만으로 일관성 있는 캐릭터와 서사를 담은 이미지를 생성하고 시나리오를 구성했습니다.",
                achievements: [
                    { title: "일관성 유지", desc: "동일 캐릭터를 여러 장면에서 유지하는 기법" },
                    { title: "스타일 제어", desc: "시각적 문법을 통한 정교한 이미지 생성" }
                ],
                tools: ["Midjourney", "DALL-E 3"],
                category: "멀티모달 실습"
            }
        ];

        const listView = document.getElementById('list-view');
        const detailView = document.getElementById('detail-view');
        const backBtn = document.getElementById('back-btn');
        const projectContainer = document.getElementById('project-container');
        const actionButtonContainer = document.getElementById('action-button-container');

        function showDetail(projectId) {
            const project = projects.find(p => p.id === projectId);
            if (!project) return;

            // 특정 프로젝트(프롬포트 엔지니어링)일 때만 외부 링크 버튼 표시
            if (project.hasExternalLink) {
                actionButtonContainer.classList.remove('hidden');
            } else {
                actionButtonContainer.classList.add('hidden');
            }

            document.getElementById('detail-task-id').innerText = `TASK ${String(project.id).padStart(2, '0')}`;
            document.getElementById('detail-title').innerText = project.title;
            document.getElementById('detail-description').innerText = project.description;
            document.getElementById('detail-category').innerText = project.category;

            // 컬러 테마 설정
            const dummy = document.createElement('div');
            dummy.className = project.color;
            document.body.appendChild(dummy);
            const projectAccent = getComputedStyle(dummy).getPropertyValue('--accent');
            document.body.removeChild(dummy);
            document.getElementById('detail-header').style.backgroundColor = `rgb(${projectAccent})`;

            document.getElementById('detail-tags').innerHTML = project.tags.map(t => `<span class="px-2 py-1 rounded bg-white/20 text-[9px] font-bold uppercase">#${t}</span>`).join('');
            document.getElementById('detail-achievements').innerHTML = project.achievements.map(a => `
                <div class="p-5 rounded-2xl bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 flex gap-4">
                    <div class="w-8 h-8 rounded-full bg-emerald-500/10 text-emerald-500 flex items-center justify-center shrink-0">
                        <i class="fa-solid fa-check text-xs"></i>
                    </div>
                    <div>
                        <h4 class="font-bold text-sm mb-1">${a.title}</h4>
                        <p class="text-xs text-slate-500 dark:text-slate-400">${a.desc}</p>
                    </div>
                </div>
            `).join('');

            document.getElementById('detail-tools').innerHTML = project.tools.map(t => `<span class="px-3 py-1.5 rounded-lg bg-slate-100 dark:bg-white/10 text-[10px] font-bold text-slate-600 dark:text-slate-300">${t}</span>`).join('');

            listView.classList.remove('view-active');
            listView.classList.add('view-hidden');
            detailView.classList.remove('view-hidden');
            detailView.classList.add('view-active');
            backBtn.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showList() {
            detailView.classList.remove('view-active');
            detailView.classList.add('view-hidden');
            listView.classList.remove('view-hidden');
            listView.classList.add('view-active');
            backBtn.classList.add('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderCards() {
            projectContainer.innerHTML = '';
            projects.forEach(p => {
                const card = document.createElement('div');
                card.className = `project-card ${p.color} bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-[2.5rem] p-4 cursor-pointer group`;
                
                card.innerHTML = `
                    <div class="h-48 rounded-[2rem] bg-slate-100 dark:bg-white/5 mb-6 flex items-center justify-center relative overflow-hidden">
                        <div class="absolute inset-0 opacity-10 group-hover:opacity-20 transition-opacity bg-[radial-gradient(circle_at_center,_rgba(var(--accent),0.4)_0%,_transparent_70%)]"></div>
                        <i class="fa-solid ${p.icon} text-5xl text-slate-300 dark:text-slate-800 transition-all duration-500 group-hover:scale-110" style="color: rgba(var(--accent), 0.3)"></i>
                        <div class="absolute top-4 left-4 px-3 py-1 rounded-full bg-white/80 dark:bg-black/40 backdrop-blur-md text-[9px] font-black text-slate-500 dark:text-slate-400">TASK ${p.id}</div>
                    </div>
                    <div class="px-4 pb-4">
                        <div class="flex items-center gap-2 mb-3">
                            ${p.tags.slice(0, 2).map(t => `<span class="text-[9px] font-bold text-slate-400 uppercase tracking-tight">#${t}</span>`).join('')}
                        </div>
                        <h3 class="text-xl font-black mb-3 text-slate-900 dark:text-white group-hover:text-blue-500 transition-colors leading-tight">${p.title}</h3>
                        <p class="text-xs text-slate-500 dark:text-slate-400 line-clamp-2 mb-6 leading-relaxed">${p.description}</p>
                        
                        <div class="flex items-center justify-between">
                            <div class="flex -space-x-2">
                                <div class="w-8 h-8 rounded-full border-2 border-white dark:border-darkBg bg-blue-500/10 text-blue-500 flex items-center justify-center text-[10px]"><i class="fa-solid fa-code"></i></div>
                                <div class="w-8 h-8 rounded-full border-2 border-white dark:border-darkBg bg-emerald-500/10 text-emerald-500 flex items-center justify-center text-[10px]"><i class="fa-solid fa-bolt"></i></div>
                            </div>
                            <div class="w-10 h-10 rounded-full bg-slate-100 dark:bg-white/5 flex items-center justify-center text-slate-400 group-hover:bg-blue-600 group-hover:text-white transition-all shadow-md">
                                <i class="fa-solid fa-arrow-right"></i>
                            </div>
                        </div>
                    </div>
                `;

                card.onclick = () => showDetail(p.id);
                projectContainer.appendChild(card);
            });
        }

        renderCards();
        backBtn.onclick = showList;

        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const html = document.documentElement;

        function updateTheme(isDark) {
            html.classList.toggle('dark', isDark);
            themeIcon.className = isDark ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        themeToggle.addEventListener('click', () => updateTheme(!html.classList.contains('dark')));
        updateTheme(localStorage.getItem('theme') !== 'light');
    </script>
</body>
</html>
